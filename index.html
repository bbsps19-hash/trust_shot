<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>믿음의 명사수</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <main id="app">
      <section id="startScreen" class="screen active" aria-label="시작 화면">
        <img src="assets/images/믿음의 명사수.png" alt="믿음의 명사수 시작 화면" class="screen-bg" />
        <button class="hotspot full-screen-hotspot" type="button" data-action="start" aria-label="게임 시작"></button>
      </section>

      <section id="playerSelectScreen" class="screen" aria-label="인원 선택 화면">
        <img src="assets/images/1인2인고르기.png" alt="1인 또는 2인 선택 화면" class="screen-bg" />
        <button class="hotspot player-one-hotspot" type="button" data-action="select-one" aria-label="1인 선택"></button>
        <button class="hotspot player-two-hotspot" type="button" data-action="select-two" aria-label="2인 선택"></button>
      </section>

      <section id="twoPlayerModeScreen" class="screen" aria-label="2인 모드 선택 화면">
        <img src="assets/images/2인모드선택.png" alt="2인 모드 선택 화면" class="screen-bg" />
        <button class="hotspot cooperation-hotspot" type="button" data-action="select-cooperation" aria-label="손잡고 함께가세 선택"></button>
        <button class="hotspot versus-hotspot" type="button" data-action="select-versus" aria-label="선한싸움 다 싸우고 선택"></button>
      </section>

      <section id="mapSelectScreen" class="screen" aria-label="맵 선택 화면">
        <img src="assets/images/맵선택.png" alt="맵 선택 화면" class="screen-bg" />
        <button class="hotspot map-arcade-hotspot" type="button" data-theme="arcade" aria-label="아케이드 맵 선택"></button>
        <button class="hotspot map-metal-hotspot" type="button" data-theme="metalSlug" aria-label="메탈슬러그 맵 선택"></button>
        <button class="hotspot map-starwars-hotspot" type="button" data-theme="starWars" aria-label="스타워즈 맵 선택"></button>
        <button class="hotspot map-random-hotspot" type="button" data-theme="random" aria-label="랜덤 맵 선택"></button>
      </section>

      <section id="transitionScreen" class="screen" aria-label="선택한 맵">
        <img id="transitionImage" alt="선택한 맵" class="transition-image" />
      </section>

      <section id="videoScreen" class="screen" aria-label="게임 영상">
        <video id="gameVideo" class="game-video" playsinline preload="auto"></video>
      </section>

      <section id="endScreen" class="screen" aria-label="게임 종료 화면">
        <div class="end-content">
          <h1>수고하셨습니다.</h1>
          <h2>함께 선교합시다!</h2>
        </div>
      </section>
    </main>
  </body>
</html>
